name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump patch versions
        id: bump
        run: |
          python3 - <<'EOF'
          import json, glob, os

          def bump_patch(version):
              parts = version.split(".")
              parts[-1] = str(int(parts[-1]) + 1)
              return ".".join(parts)

          # Bump all Claude plugin.json files and sync to Codex + Cursor manifests
          versions = {}
          for path in sorted(glob.glob("plugins/*/.claude-plugin/plugin.json")):
              plugin_name = path.split("/")[1]
              with open(path) as f:
                  data = json.load(f)
              data["version"] = bump_patch(data.get("version", "1.0.0"))
              versions[plugin_name] = data["version"]
              with open(path, "w") as f:
                  json.dump(data, f, indent=2)
                  f.write("\n")
              print(f"Bumped {path} → {data['version']}")

              # Keep Codex and Cursor manifests in sync
              for kind in ("codex", "cursor"):
                  alt_path = f"plugins/{plugin_name}/.{kind}-plugin/plugin.json"
                  if os.path.exists(alt_path):
                      with open(alt_path) as f:
                          alt_data = json.load(f)
                      alt_data["version"] = data["version"]
                      with open(alt_path, "w") as f:
                          json.dump(alt_data, f, indent=2)
                          f.write("\n")
                      print(f"Synced  {alt_path} → {data['version']}")

          # Bump marketplace.json (Claude + Cursor)
          new_version = None
          for mp_path in (".claude-plugin/marketplace.json", ".cursor-plugin/marketplace.json"):
              if not os.path.exists(mp_path):
                  continue
              with open(mp_path) as f:
                  mp = json.load(f)
              new_version = bump_patch(mp.get("version", "1.0.0"))
              mp["version"] = new_version
              for entry in mp.get("plugins", []):
                  if entry["name"] in versions:
                      entry["version"] = versions[entry["name"]]
              with open(mp_path, "w") as f:
                  json.dump(mp, f, indent=2)
                  f.write("\n")
              print(f"Bumped {mp_path} → {new_version}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"version={new_version}\n")
          EOF

      - name: Commit version bumps
        run: |
          git add .claude-plugin/marketplace.json .cursor-plugin/marketplace.json plugins/*/.claude-plugin/plugin.json plugins/*/.codex-plugin/plugin.json plugins/*/.cursor-plugin/plugin.json
          git diff --cached --quiet || git commit -m "chore: bump versions to ${{ steps.bump.outputs.version }} [skip ci]"
          git push

      - name: Create release tag
        run: |
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin "v${{ steps.bump.outputs.version }}"

      - name: Create GitHub release
        run: |
          gh release create "v${{ steps.bump.outputs.version }}" \
            --title "v${{ steps.bump.outputs.version }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
